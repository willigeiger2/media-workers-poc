version: "3.8"

services:
  container:
    build:
      context: .
      dockerfile: container/Dockerfile
    container_name: media-workers-container
    ports:
      - "8788:8080"
    environment:
      - STREAM_URL=${STREAM_URL}
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
